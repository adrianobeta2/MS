<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Vision Embarcado</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            background: #121212; 
        }
        @keyframes spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
        }

    .spinner {
        width: 50px;
        height: 50px;
        border: 6px solid rgba(255,255,255,0.3);
        border-top: 6px solid #3498db;
        border-radius: 50%;
        margin: 0 auto 15px auto;
        animation: spin 1s linear infinite;
    }

    .loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.6);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
    }

    .loading-content {
        background:#121212; 
        padding: 20px 40px;
        border-radius: 12px;
        text-align: center;
        box-shadow: 0px 0px 15px rgba(0,0,0,0.4);
    }

    .loading-content p {
        color: #ffffff;
        font-size: 16px;
        font-weight: bold;
    }
        /* ===============================
           SIDEBAR DE CONTROLES
           =============================== */
        #controls {
            width: 90px;
           /* background: hsl(0, 2%, 12%); */
            box-shadow: -2px 0 10px rgba(0,0,0,0.15); /* sombra correta */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 5px;
            gap: 8px;
          
            
        }

        #controls select {
            width: 70px;
            padding: 5px;
            border-radius: 10px;
            border: 1px solid #ccc;
            text-align: center;
            font-size: 13px;
        }

        #controls button {
            width: 60px;
            height: 60px;
            border: 2px solid  #494B4E; 
            border-radius: 15px;
            background:   #494B4E; 
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.25s;
        }

        #controls button:hover {
            background: #00050a;
            transform: scale(1.2);
        }

        #controls button img {
            width: 55px;
            height: 55px;
        }

         /* ===============================
           SIDEBAR DE CONTROLES a direita
           =============================== */
       #controls_right {
        width: 90px;
       /* background: hsl(0, 2%, 12%);*/
        box-shadow: -2px 0 10px rgba(0,0,0,0.15); /* sombra correta */
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 10px 5px; /* padding correto */
        gap: 8px;
      
        
      }

        #controls_right select {
            width: 70px;
            padding: 5px;
            border-radius: 10px;
            border: 1px solid #ccc;
            text-align: center;
            font-size: 13px;
        }

        #controls_right button {
            width: 65px;
            height: 65px;
            border: 2px solid #494B4E; 
            border-radius: 15px;
            background: #494B4E;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.25s;
          
        }

        #controls_right button:hover {
            background:  #00050a;
            transform: scale(1.2);
        }

        #controls_right button img {
            width: 60px;
            height: 60px;
        }

        
        #controls_IA {
            display: inline-flex;        /* ⬅️ encolhe ao conteúdo */
            flex-direction: row;
            gap: 8px;
            align-items: center;
           /* background: hsl(0, 2%, 12%);*/
                
            padding: 8px 10px;           /* justo aos botões */
            
            
            box-shadow: 0 2px 6px rgba(0,0,0,0.25);
        }
            
        #controls_IA select {
            width: 70px;
            padding: 5px;
            border-radius: 10px;
            border: 1px solid #ccc;
            text-align: center;
            font-size: 13px;
        }

        #controls_IA button {
            width: 65px;
            height: 65px;
           
            border-radius: 15px;
            background: black; 
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.25s;
            border: 1px solid  black; 
        }

        #controls_IA button:hover {
            background: #00050a;
            transform: scale(1.2);
        }

        #controls_IA button img {
            width: 60px;
            height: 60px;
        }



        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            margin-top: 6px;
        }

        .control-group label {
            font-size: 11px;
            color: #555;
        }

        .control-group input {
            width: 60px;
            padding: 4px;
            border-radius: 10px;
            border: 1px solid #ccc;
            text-align: center;
            background: #f5f5f5;
        }

        .button-limites {
            background: #28a745;
        }

        .button-reboot {
            background: #dc3545;
        }

        /* ===============================
           ÁREA DO CANVAS (ESQUERDA)
           =============================== */
            /* ===============================
        ÁREA CENTRAL (CANVAS + MENU DIREITO)
        =============================== */
       #workspace {
            flex: 1;
            display: flex;
            align-items: flex-start; /* ⬅️ ALINHA NO TOPO */
            background:  #121212; 
            padding-top: 20px;   /* ⬅️ MARGEM SUPERIOR GLOBAL */
            padding-left: 40px;  /* ⬅️ MARGEM ESQUERDA GLOBAL */
           
        }

        /* Canvas container agora só cuida do canvas */
        #canvas-container {
            display: flex;
            align-items: center;
            padding-left: 10px;
        }

        #canvas {
            border: 2px solid   #494B4E;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.4);
            background: #000;
        }
                /* Empilha canvas + controles */
        .canvas-stack {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

       #image-controls {
            width: 100%;
            max-width: 800px;
            margin-top: 8px;
            display: flex;
            gap: 8px;
            justify-content: flex-start;
            align-items: center;
        }

        #image-controls .control-group {
            min-width: auto;
        }

        #image-controls .control-group label {
            font-size: 12px;
            color: #dad3d3f4;
        }

        #image-controls .control-group input {
            width: 55px;
            padding: 3px 5px;
            font-size: 11px;
            color: #000;
        }

        /* Ajuste visual fino */
        #image-controls .control-group {
            min-width: 90px;
        }
        /* Permite overlay absoluto */
        .canvas-stack {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* CONTROLES SUPERIORES NO CANTO ESQUERDO DO CANVAS */
        #canvas-top-controls {
            position: absolute;
            top: 12px;     /* distância do topo do canvas */
            left: 12px;    /* distância da borda esquerda do canvas */

            display: flex;
            gap: 10px;          /* ⬅️ era 16–20px */
            padding: 6px 10px;  /* ⬅️ era 10px 14px */
            border-radius: 8px; /* ⬅️ era 12px */

            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);

            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 10;
        }
         #canvas-top-controls-rigth {
            position: absolute;
            top: 12px;
            right: 24px;   /* ⬅️ AGORA é direita */

            display: flex;
            z-index: 10;
        }


        

        /* Cada bloco (Programa / ROI) */
        .top-control {
            display: flex;
            flex-direction: column;
            font-size: 12px;
        }

        .top-control label {
            margin-bottom: 2px;
            font-size: 10px;      /* ⬅️ menor */
            font-weight: 600;
            color: rgba(0,0,0,0.7);
        }

        .top-control select {
            min-width: 110px;   /* ⬅️ era 140px */
            padding: 4px 6px;   /* ⬅️ menor */
            font-size: 11px;    /* ⬅️ texto menor */

            border-radius: 6px;
            border: 1px solid rgba(0,0,0,0.25);
            background: rgba(255, 255, 255, 0.6); /* ⬅️ translúcido */
        }
        /* ===============================
        DIVISOR VERTICAL ENTRE CONTROLS_RIGHT 
        =============================== */
         #vertical-divider {
                    width: 6px;                 /* espessura da linha */
                    background: rgba(94, 92, 92, 0.15);
                    margin: 0 12px;              /* espaço lateral */
                    
                    /* acompanha a altura do workspace */
                    align-self: stretch;
        }
        
        #deleteOKLabel {
        position: absolute;
        bottom: 4px;        /* ⬅️ posição sobre a imagem */
        right: 6px;

        min-width: 18px;
        height: 18px;
        padding: 0 4px;

        background: #069b26;
        color: #fff;
        font-size: 12px;
        font-weight: bold;

        border-radius: 10px;
        line-height: 18px;
        text-align: center;

        pointer-events: none; /* ⬅️ não atrapalha clique */
    }
        #deleteNOKLabel {   
        position: absolute;
        bottom: 4px;        /* ⬅️ posição sobre a imagem */
        right: 6px;
        min-width: 18px;    
        height: 18px;  
        padding: 0 4px;
        background: #f20202;
        color: #fff;
        font-size: 12px;
        font-weight: bold;
        border-radius: 10px;
        line-height: 18px;
        text-align: center;
        pointer-events: none; /* ⬅️ não atrapalha clique */
        }
        /* Botão vira referência */
        .btn-with-overlay {
            position: relative;   /* ⬅️ base do overlay */
            width: 60px;
            height: 60px;
            padding: 0;
            border-radius: 15px;
        }

        /* Imagem normal */
        .btn-with-overlay img {
            width: 48px;
            height: 48px;
        }

        .footer-label {
            position: fixed;  /* Fixo na tela */
            bottom: 10px;     /* Distância do fundo */
            right: 10px;      /* Distância da direita */
            font-size: 14px;  /* Tamanho da fonte */
            color: #9e9999;      /* Cor do texto */
            
            padding: 5px 10px; /* Espaçamento interno */
            border-radius: 5px; /* Borda arredondada */
        } 
          #logo_ms img {
            width: 50px; /* ou height: 30px; */
            object-fit: contain; /* mantém a proporção */
             opacity: 0.15;
        }

        #watermark {
            position: fixed;
            bottom: 30px;     /* distância do fundo */
            right: 40px;      /* distância da direita */

            z-index: 1;       /* atrás dos overlays principais */
            pointer-events: none;  /* não bloqueia clique */

            opacity: 0.1;    /* efeito marca d’água */
        }

        #watermark img {
            width: 200px;     /* controla tamanho */
            height: auto;
        }
        /* ===============================
        PAINEL DIREITO (RESULTS + COORDINATES)
        =============================== */
        #right-panel {
            width: 260px;                /* largura do painel */
            display: flex;
            flex-direction: column;
            align-items: center;         /* ⬅️ CENTRALIZA HORIZONTALMENTE */
            padding-top: 20px;
            gap: 20px;
        }
        #results {
           /* border: 2px solid #007bff;*/
            width: 100%;
            max-width: 100%;
            font-size: 18px;
            color:  #dad3d3f4;
            margin-top: 20px;
         
        }
        #coordinates {
            width: 100%;
            padding: 10px 4px;     /* ⬅️ menos compressão lateral */
         
            border-radius: 0;
            font-size: 14px;
            color:  #dad3d3f4;
        }
                .status-label {
            padding: 8px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 18px;
            color: rgb(255, 255, 255);
            display: inline-block;
        }
         .status-ok {
            background-color: #28a745;
        }

        .status-nok {
            background-color: #dc3545;
        }

        .big-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 9999;
          }
          .big-overlay__text {
            font-size: clamp(48px, 20vw, 70px);
            font-weight: bold;
            color: rgba(255,255,255,0.85);
            text-shadow: 0 4px 20px rgba(0,0,0,0.5);
            opacity: 0;
            transform: scale(0.8);
            transition: opacity .4s, transform .4s;
            white-space: pre-line; /* <<< ESSENCIAL para quebrar linhas do \n */
            text-align: center;    /* centraliza várias linhas */
            text-transform: uppercase; 
          }
          .big-overlay__text.show {
            opacity: 1;
            transform: scale(1);
          }
          /* Linha de cada ROI */
            .roi-row {
                display: flex;
                align-items: center;
                gap: 12px;
                margin-bottom: 10px;
                font-size: 14px;
            }

            /* Evita quebra estranha */
            .roi-row span {
                white-space: nowrap;
            }
            /* CADA ROI = UMA LINHA ORGANIZADA */
            .input-field {
                display: grid;
                
                grid-template-columns: 
                    auto      /* ROI label */
                    auto      /* texto */
                    repeat(3, auto) /* inputs principais */
                    auto      /* RNA Status label */
                    auto      /* RNA input */
                    70px;     /* OK / NOK fixo */

                align-items: center;
                column-gap: 8px;
                row-gap: 6px;

                margin-bottom: 10px;
                font-size: 13px;
            }

            /* Labels mais previsíveis */
            .input-field label {
                white-space: nowrap;
                font-weight: 600;
            }

            /* Inputs alinhados */
            .input-field input {
                margin: 0;              /* REMOVE influência lateral */
            }

            /* Badge OK / NOK sempre alinhado */
            .status-label {
                justify-self: end;
                min-width: 60px;
                text-align: center;
            }
            #NomePrograma {
            position: relative;        /* ⬅️ fixa na tela */
            top: 12px;              /* distância do topo */
            left: 12px;             /* distância da esquerda */

            z-index: 9999;          /* fica acima de tudo */
        }

        #label-programa {
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            color: white;

            background: rgba(0, 0, 0, 0.4); 
            padding: 6px 12px;
            border-radius: 8px;

            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
         #togglePanMode:hover {
            transform: scale(1.20); /* Aumenta em 10% */
        }
        #togglePanMode:hover .pan-icon {
            transform: scale(1.20); /* Aumenta o ícone em 10% */
        }
        #togglePanMode {
            transition: transform 0.2s ease-in-out;
            transform-origin: center; /* Faz o zoom ser centralizado */
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px; /* Dá espaço para o zoom */
        }
         /* Estilo padrão do botão */
        #togglePanMode {
            background-color: #4CAF50; /* Verde */
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }

        /* Estilo quando o modo "pan" estiver ativo */
        #togglePanMode.pan-active {
            background-color: #f44336; /* Vermelho */
        }
        .popup{
            position: absolute;
            background: #121212;              /* fundo preto */
            border: 2px solid#494B4E;      /* contorno lilás */
            padding: 18px;
            border-radius: 10px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            z-index: 1000;
            min-width: 180px;
            text-align: center;
            color: white;
        }

        .popup h3{
            margin-top: 0;
            margin-bottom: 10px;
            color:  #dad3d3f4;                  /* lilás claro */
            font-size: 18px;
        }

        .popup button{
            padding: 8px 18px;
            margin: 5px;
            font-size: 14px;
            border-radius: 6px;
            border: 2px solid#494B4E;       /* contorno lilás */
            background: transparent;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .popup button:hover{
            background: #494B4E;
            color: white;
        }

     </style>
    </head>

        function setMode(mode) {
            // Restaura o estilo de todos os botões
            const buttons = document.querySelectorAll('button');
            buttons.forEach(button => {
                button.style.backgroundColor = '';
                button.style.color = '';
            });
             // Define o modo atual
            currentMode = mode;

            canvas.selection = mode === 'edit';

                    // Altera o estilo do botão selecionado
            const selectedButton = document.getElementById(`${mode}Btn`);
            if (selectedButton) {
                selectedButton.style.backgroundColor = '#00ff3c'; // Cor de fundo azul
                selectedButton.style.color = '#FFFFFF'; // Cor do texto branco
            }

            canvas.getObjects().forEach(obj => {
                if (obj.type === 'rect' || obj.type === 'circle') {
                    obj.selectable = mode === 'edit';
                    obj.evented = mode === 'edit';
                }
            });
        }

        let isPanMode = false; // Variável para controlar o modo "pan"
        let isDragging = false; // Variável para controlar o arrasto no modo "pan"
        let lastPosX = 0, lastPosY = 0; // Armazenar a última posição do mouse
        
        // Função para alternar o modo "pan"
        document.getElementById('togglePanMode').addEventListener('click', function() {
            isPanMode = !isPanMode; // Alterna entre ativo e inativo
            this.textContent = isPanMode ? "Desativar Pan" : "Ativar Pan";
            canvas.selection = !isPanMode; // Desativa a seleção de objetos no modo "pan"
            canvas.defaultCursor = isPanMode ? "grab" : "default"; // Altera o cursor

             // Alterna a classe "pan-active" para mudar o estilo do botão
             this.classList.toggle('pan-active', isPanMode);
        });
        
        // Evento de mouse down
        canvas.on('mouse:down', function(event) {
            if (currentMode === 'edit' && event.target) {
                // Modo de edição: permite mover objetos
                isDragging = false; // Desativa o arrasto do modo "pan"
                return;
            }
        
            if (isPanMode) {
                // Modo "pan": inicia o arrasto
                isDragging = true;
                lastPosX = event.e.clientX;
                lastPosY = event.e.clientY;
                canvas.defaultCursor = "grabbing"; // Altera o cursor durante o arrasto
            } else if (currentMode === 'edit') { 
                return; // Modo de edição, não faz nada
            } else {
                // Modo de desenho: inicia o desenho de formas
                isDrawing = true;
                const pointer = canvas.getPointer(event.e);
                startX = pointer.x;
                startY = pointer.y;
        
                if (currentMode === 'drawRectangle') {
                    shape = new fabric.Rect({
                        left: startX,
                        top: startY,
                        fill: 'rgba(255, 0, 0, 0.1)',
                        stroke: 'lime',
                        strokeWidth: 2,
                        width: 0,
                        height: 0,
                    });
                } else if (currentMode === 'drawCircle') {
                    shape = new fabric.Circle({
                        left: startX,
                        top: startY,
                        fill: 'rgba(255, 0, 0, 0.1)',
                        stroke: 'lime',
                        strokeWidth: 2,
                        radius: 0,
                    });
                }
                canvas.add(shape);
            }
        });
        
        // Evento de mouse move
        canvas.on('mouse:move', function(event) {
            if (currentMode === 'edit' && event.target) {
                // Modo de edição: permite mover objetos
                isDragging = false; // Desativa o arrasto do modo "pan"
                return;
            }
        
            if (isPanMode && isDragging) {
                // Modo "pan": move o canvas
                const deltaX = event.e.clientX - lastPosX;
                const deltaY = event.e.clientY - lastPosY;
                canvas.relativePan({ x: deltaX, y: deltaY });
                lastPosX = event.e.clientX;
                lastPosY = event.e.clientY;
            } else if (isDrawing) {
                // Modo de desenho: atualiza a forma sendo desenhada
                const pointer = canvas.getPointer(event.e);
                if (currentMode === 'drawRectangle') {
                    const width = pointer.x - startX;
                    const height = pointer.y - startY;
                    shape.set({
                        width: Math.abs(width),
                        height: Math.abs(height),
                        left: width < 0 ? pointer.x : startX,
                        top: height < 0 ? pointer.y : startY,
                    });
                } else if (currentMode === 'drawCircle') {
                    const radius = Math.sqrt(
                        Math.pow(pointer.x - startX, 2) +
                        Math.pow(pointer.y - startY, 2)
                    );
                    shape.set({
                        radius: radius,
                        left: startX - radius,
                        top: startY - radius,
                    });
                }
                canvas.renderAll();
            }
        });
        
        // Evento de mouse up
        canvas.on('mouse:up', function() {
            if (isPanMode) {
                // Modo "pan": finaliza o arrasto
                
                isDragging = false;
                canvas.defaultCursor = "grab"; // Restaura o cursor
            } else if (isDrawing || currentMode === 'edit') {
                // Modo de desenho: finaliza o desenho
                isDrawing = false;
                shape.set({ selectable: true, evented: true });
                //updateCoordinates();
                canvas.renderAll();

                const pointer = canvas.getPointer(event.e);

                openAnnotationPopup(pointer.x, pointer.y, shape);
            }
        });
                // Alterar a cor depois
        function changeRectangleColor(rectangle, fillColor, strokeColor) {
            rectangle.set({
                fill: fillColor || rectangle.fill, // Atualiza o preenchimento, se fornecido
                stroke: strokeColor || rectangle.stroke, // Atualiza o contorno, se fornecido
            });

            canvas.renderAll(); // Renderiza as mudanças no canvas
        }

        // Função para alterar a cor de preenchimento e borda de um círculo
        function changeCircleColor(circle, fillColor, strokeColor) {
            circle.set({
                fill: fillColor || circle.fill, // Atualiza o preenchimento, se fornecido
                stroke: strokeColor || circle.stroke, // Atualiza o contorno, se fornecido
            });
            canvas.renderAll(); // Renderiza o canvas para aplicar as mudanças
        }
        function getAdjustedCoordinates(obj) {
            if (obj.type === 'rect') {
                const { left, top, width, height, scaleX, scaleY } = obj;
                return {
                    x: (left / imageScaleX).toFixed(1),
                    y: (top / imageScaleY).toFixed(1),
                    width: ((width * scaleX) / imageScaleX).toFixed(1),
                    height: ((height * scaleY) / imageScaleY).toFixed(1),
                };
            } else if (obj.type === 'circle') {
                const { left, top, radius, scaleX, scaleY } = obj;
                return {
                    centerX: ((left + radius) / imageScaleX).toFixed(1),
                    centerY: ((top + radius) / imageScaleY).toFixed(1),
                    radiusX: ((radius * scaleX) / imageScaleX).toFixed(1),
                    radiusY: ((radius * scaleY) / imageScaleY).toFixed(1),
                };
            }
            return null;
        }
        function clearLabels() {
            // copia a lista para evitar problemas ao remover durante iteração
            const objs = canvas.getObjects().slice();
            const removed = [];
          
            for (const obj of objs) {
              try {
                // 1) Remover objetos explicitamente marcados
                if (obj && obj.isLabel) {
                  canvas.remove(obj);
                  removed.push(obj);
                  continue;
                }
          
                // 2) Fallback heurístico: textos amarelos com formato ROI...
                if (obj && obj.type === 'text') {
                  const text = (typeof obj.text === 'string') ? obj.text : '';
                  const isYellow = obj.fill && obj.fill.toString().toLowerCase().includes('yellow');
                  const looksLikeROI = /^roi\d*/i.test(text); // "ROI1", "roi2", "ROI"
                  if (isYellow && looksLikeROI) {
                    canvas.remove(obj);
                    removed.push(obj);
                  }
                }
          
                // Se labels podem estar dentro de grupos, descomente se precisar:
                // if (obj.type === 'group') { /* iterar obj._objects e remover marcados */ }
              } catch (e) {
                console.warn('clearLabels: erro ao processar objeto', obj, e);
              }
            }
          
            // garantir que nada fique selecionado e forçar render
            canvas.discardActiveObject();
            canvas.requestRenderAll ? canvas.requestRenderAll() : canvas.renderAll();
          
            console.log(`clearLabels: removidos ${removed.length} objetos (detalhe no console).`, removed);
          }
          
        
        function updateCoordinates() {
            const coordinatesDiv = document.getElementById('coordinates');

            // 1️⃣ LIMPA A TELA PRIMEIRO
            coordinatesDiv.innerHTML = '';

            clearLabels();

            // 2️⃣ Cabeçalho
            let html = '<strong>Coordenadas das ROIs:</strong><br>';

            // 3️⃣ Percorre objetos do canvas
            canvas.getObjects().forEach(obj => {
                if (obj.type === 'rect' || obj.type === 'circle') {
                    const adjusted = getAdjustedCoordinates(obj);
                    if (!adjusted) return;

                    if (obj.type === 'rect') {
                        html += `
                            Retângulo → 
                            x: ${adjusted.x}, 
                            y: ${adjusted.y}, 
                            w: ${adjusted.width}, 
                            h: ${adjusted.height}
                            <br>
                        `;
                    }

                    if (obj.type === 'circle') {
                        html += `
                            Círculo → 
                            cx: ${adjusted.centerX}, 
                            cy: ${adjusted.centerY}, 
                            rx: ${adjusted.radiusX}, 
                            ry: ${adjusted.radiusY}
                            <br>
                        `;
                    }
                }
            });

            // 4️⃣ ESCREVE UMA ÚNICA VEZ
            coordinatesDiv.innerHTML = html;
        }

        function acompanharProgressoTreino() {
            const interval = setInterval(async () => {
                try {
                    const response = await fetch(`${SERVER_URL}/training_status`);
                    const data = await response.json();

                    if (!data.running) {
                        clearInterval(interval);

                        document.getElementById("training-bar").style.width = "100%";
                        document.getElementById("training-percent").innerText = "100%";
                        document.getElementById("training-text").innerText =
                            "Treinamento concluído!";

                        setTimeout(() => {
                            document.getElementById("loading-popup").style.display = "none";
                            alert("Treinamento finalizado com sucesso!");
                        }, 800);

                        return;
                    }

                    // Atualiza UI
                    document.getElementById("training-bar").style.width =
                        data.progress + "%";

                    document.getElementById("training-percent").innerText =
                        data.progress + "%";

                    document.getElementById("training-text").innerText =
                        data.mensagem || "Treinando...";

                } catch (err) {
                    console.error("Erro ao consultar progresso:", err);
                }
            }, 1000);

        // Substituir endpoints pelos definidos no servidor Flask
        async function fetchImage() {
            let camera  = 0;
            let tipo = "";
            let response = null;
            const selectedCamera = document.getElementById('camera-section').value;
            const selectedValue = parseInt(selectedCamera,10); 
            const config = await fetchCameraConfig();
            tipo = cameraConfig.tipo;
            if(selectedValue === 1){
                if(tipo ==="basler"){
                    camera =  cameraConfig.cam_basler_1;
                }
                else{
                    camera =  cameraConfig.cam_1;
                }
             
            }
            else if(selectedValue ===2){
                if(tipo === "basler"){
                    camera = cameraConfig.cam_basler_2;
                }
                else{
                    camera =  cameraConfig.cam_2;
                }
                
            }
             else {
                if(tipo === "basler"){
                    camera = cameraConfig.cam_basler_3;
                }
                else{
                    camera =  cameraConfig.cam_3;
                }
                
            }
            
            
            if(tipo ==="webcam"){
                camera = encodeURIComponent(camera);  // codifica o path 
                response = await fetch(`${SERVER_URL}/capture_webcam/${camera}`);
            }
            else{
                response = await fetch(`${SERVER_URL}/capture/${camera}`);
            }
            
           
            const imageBlob = await response.blob(); // Obter o blob da imagem
            const imageUrl = URL.createObjectURL(imageBlob); // Criar uma URL para o blob da imagem      

            await loadImage(imageUrl); // Carregar a imagem no canvas// Definir a imagem como plano de fundo
           
        }

        async function sendData() {
            // Obter as ROIs ajustadas
            const rois = canvas.getObjects()
                .filter(obj => obj.type === 'rect' || obj.type === 'circle')
                .map(obj => {
                    const adjusted = getAdjustedCoordinates(obj);

                    if(obj.type === 'rect'){
                    return {
                        
                        x: parseInt(adjusted.x),
                        y: parseInt(adjusted.y),
                        width: parseInt(adjusted.width),
                        height: parseInt(adjusted.height),
                    };
                  }else{
                    return {
                        
                        x: parseInt(adjusted.centerX),
                        y: parseInt(adjusted.centerY),
                        width: parseInt(adjusted.radiusX),
                        height: parseInt(adjusted.radiusY),
                    };
                  }
                });

            // Garantir que pelo menos uma ROI está presente
            if (rois.length === 0) {
                alert("Nenhuma ROI encontrada para envio.");
                return;
            }

            // Selecionar a última ROI criada (ou outro critério, se necessário)
            const roi = rois[rois.length - 1];

            // Obter valores de contraste, brilho, gamma ,exposicao
            let contrastValue = document.getElementById('contrast').value;
            let brightnessValue = document.getElementById('brightness').value;
            let gammaValue = document.getElementById('gamma').value;
            let exposureValue = document.getElementById('exposure').value;

            // Adicionar seleção de seção ROI (ex: ROI1, ROI2, ROI3)
            const selectedSection = document.getElementById('roi-section').value;

           
            // Garantir que a seção foi selecionada
            if (!selectedSection) {
                alert("Por favor, selecione uma seção de ROI.");
                return;
            }

            // Ajustes de imagem
            const adjustments = {
                contrast: contrastValue, // Valores ajustáveis
                brightness: brightnessValue,
                gamma: gammaValue,
                exposure: exposureValue,
                roi: {
                    section: selectedSection, // Adiciona a seção selecionada
                    ...roi,
                },
            };

            try {

                const selectedProgram = document.getElementById('programa-section').value;
                const selectedCamera = document.getElementById('camera-section').value;

                // Adiciona o programa dentro do objeto adjustments
                const requestData = {
                    programa: selectedProgram,
                    camera: selectedCamera,
                    ...adjustments // Mantém os outros ajustes já existentes
                };

                const response = await fetch(`${SERVER_URL}/config`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestData),
                });

                if (!response.ok) {
                    const errorMessage = await response.text();
                    console.error("Erro ao enviar dados:", errorMessage);
                    alert("Erro ao enviar dados. Verifique o console para mais detalhes.");
                } else {
                    const coordinatesDiv = document.getElementById('coordinates');
                    coordinatesDiv.innerHTML = '<strong>Dados enviados com sucesso!</strong><br>';
                }
            } catch (error) {
                console.error("Erro de comunicação com o servidor:", error);
                alert("Erro ao conectar ao servidor.");
            }
            showOverlayMessage(selectedSection +" salvo com sucesso!", { duration: 1800, color: 'rgba(255,255,255,0.4)' });
           // irParaProximoROI();
        }

        async function receiveData() {
            // Adicionar seleção de seção ROI (ex: ROI1, ROI2, ROI3)
            await fetchImage();

            const selectedProgram = document.getElementById('programa-section').value;
            const selectedCamera = document.getElementById('camera-section').value;
            const selectedSection = document.getElementById('roi-section').value;
            //const response = await fetch(`${SERVER_URL}/config?section=${selectedSection}`);
            const response = await fetch(`${SERVER_URL}/config?programa=${encodeURIComponent(selectedProgram)}&camera=${encodeURIComponent(selectedCamera)}&section=${encodeURIComponent(selectedSection)}`);
            clearLabels();
            if (!response.ok) {
                console.error("Erro ao obter os dados do servidor:", await response.text());
                return;
            }

            const data = await response.json();

            // Log para depuração
            console.log("Dados recebidos do servidor:", data);

            // Atualizar os campos de brilho, contraste e gamma
            document.getElementById('contrast').value = data.contrast;
            document.getElementById('brightness').value = data.brightness;
            document.getElementById('gamma').value = data.gamma;
            document.getElementById('exposure').value = data.exposure;

            // Verificar se existe uma propriedade 'roi'
            if (data.roi) {
                console.log("ROI detectado:", data.roi);

                const roi = data.roi;
                //canvas.clear();
                

               // Caso o ROI seja um retângulo
                if (roi.width != roi.height) {
                    const rect = new fabric.Rect({
                        left: roi.x * imageScaleX,
                        top: roi.y * imageScaleY,
                        width: roi.width * imageScaleX,
                        height: roi.height * imageScaleY,
                        fill: 'rgba(255, 0, 0, 0.1)',
                        stroke: 'lime',
                        strokeWidth: 2,
                    });
                    retanguloRef = rect; 
                    canvas.add(rect);

                    // 🔹 Label ao lado do retângulo
                    const label = new fabric.Text(selectedSection.toUpperCase(), {
                        left: rect.left + rect.width + 5, // deslocado 5px pra direita
                        top: rect.top,
                        fontSize: 12,
                        fill: 'yellow',
                        fontWeight: 'bold',
                        selectable: false, // não deixa mover
                        evented: false     // ignora eventos de mouse
                    });
                    canvas.add(label);

                } else if (roi.width == roi.height) {
                    const circle = new fabric.Circle({
                        left: (roi.x - roi.width) * imageScaleX,
                        top: (roi.y - roi.height) * imageScaleY,
                        radius: roi.width * imageScaleX,
                        fill: 'rgba(255, 0, 0, 0.1)',
                        stroke: 'lime',
                        strokeWidth: 2,
                    });
                    circuloRef = circle;
                    canvas.add(circle);

                    // 🔹 Label ao lado do círculo
                    const label = new fabric.Text(selectedSection.toUpperCase(), {
                        left: circle.left + circle.radius * 2 + 5, // deslocado à direita do círculo
                        top: circle.top,
                        fontSize: 12,
                        fill: 'yellow',
                        fontWeight: 'bold',
                        selectable: false,
                        evented: false
                    });
                    canvas.add(label); 
                }

               //updateCoordinates();
               const coordinatesDiv = document.getElementById('coordinates');
               coordinatesDiv.innerHTML = '<strong></strong><br>';
               coordinatesDiv.innerHTML = '<strong>Dados recebidos com sucesso!</strong><br>';
            } else {
                console.warn("Nenhuma ROI encontrada na resposta.");
            }
        }

        async function resolveCamera(selectedCamera) {
                    const config = await fetchCameraConfig();
                    const tipo = cameraConfig.tipo;

                    if (tipo === "basler") {
                        throw new Error("Funcionalidade não ativa para câmera Basler");
                    }

                    if (selectedCamera === 1) return cameraConfig.cam_1;
                    if (selectedCamera === 2) return cameraConfig.cam_2;
                    return cameraConfig.cam_3;
                }
                function updateSlot(popup, slotId, label, videoFeedUrl, extraHtml = "") {
            popup.document.getElementById(slotId).innerHTML = `
                <div class="label">${label}</div>
                ${extraHtml}
                <img src="${videoFeedUrl}">
            `;
        }

        async function irParaProximoROI() {
            const select = document.getElementById('roi-section');
            const currentIndex = select.selectedIndex;
        
            if (currentIndex < select.options.length - 1) {
                select.selectedIndex = currentIndex + 1;
            } else {
                // Opcional: volta para o primeiro ROI ao chegar no último
                select.selectedIndex = 0;
            }
        
            // Opcional: dispara o evento de mudança se você tiver listeners
            select.dispatchEvent(new Event('change'));
        }
