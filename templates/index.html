<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MSV | Monitoramento </title>
  
  <style>
    :root {
      --bg-color: #0a0f1a;
      --glass-bg: rgba(15, 23, 42, 0.95);
      --border-color: rgba(255, 255, 255, 0.08);
      --primary-blue: #3b82f6;
      --success-green: #22c55e;
      --danger-red: #ef4444;
      --text-main: #f8fafc;
      --text-dim: #64748b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      line-height: 1.4;
      overflow-x: auto;
    }

    /* Header com Relógio */
    nav {
      position: fixed;
      top: 0; width: 100%; z-index: 100;
      background: var(--glass-bg);
      backdrop-filter: blur(8px);
      padding: 10px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
    }

    .brand-section { display: flex; align-items: center; gap: 12px; }
    
    .clock-section {
      font-family: monospace;
      font-size: 20px;
      font-weight: bold;
      color: var(--primary-blue);
      background: rgba(0,0,0,0.3);
      padding: 5px 15px;
      border-radius: 6px;
      border: 1px solid var(--border-color);
    }

    .config-btn {
      background: #1e293b;
      color: #94a3b8;
      border: 1px solid var(--border-color);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 11px;
      font-weight: bold;
    }

    /* Layout Principal */
    main { padding: 90px 20px 40px 20px; display: flex; flex-direction: column; align-items: center; }
    
    .panel-cam {
      background: var(--glass-bg);
      border-radius: 24px;
      padding: 25px;
      display: flex;
      flex-direction: row;
      gap: 25px;
      margin-bottom: 40px;
      border: 1px solid var(--border-color);
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      width: fit-content; /* Ajusta ao conteúdo (800px + laterais) */
    }

    /* ROIs */
    .roi-section { width: 200px; flex-shrink: 0; }
    .roi-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      margin-bottom: 15px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 5px;
    }
    .roi-card {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
      font-weight: bold;
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .roi-ok { background: rgba(34, 197, 94, 0.1); color: var(--success-green); }
    .roi-nok { background: rgba(239, 68, 68, 0.1); color: var(--danger-red); }

    /* Container Imagem 800x600 */
    .view-section { 
      position: relative; 
      width: 800px; 
      height: 600px; 
      flex-shrink: 0;
    }
    
    .prog-badge {
      position: absolute;
      top: 15px; left: 15px;
      background: var(--primary-blue);
      padding: 5px 15px;
      border-radius: 4px;
      font-weight: 800;
      font-size: 13px;
      z-index: 10;
      text-transform: uppercase;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    .camera-img {
      width: 800px;
      height: 600px;
      object-fit: cover;
      background: #000;
      border-radius: 15px;
      border: 3px solid #1e293b;
    }

    /* Logo MS sobre a imagem */
    .logo-ms {
      position: absolute;
      bottom: 15px;
      left: 15px;
      width: 60px;
      opacity: 0.6;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8));
    }

    /* Coluna de Status */
    .info-section { 
      width: 250px; 
      flex-shrink: 0; 
      display: flex; 
      flex-direction: column; 
      justify-content: space-between; 
    }
    
    .cam-label { font-size: 20px; font-weight: 900; color: var(--primary-blue); }
    .status-text { font-size: 35px; font-weight: 900; line-height: 1; margin: 20px 0; }
    .text-ok { color: var(--success-green); }
    .text-nok { color: var(--danger-red); }
    
    .perf-box { background: rgba(0,0,0,0.2); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); }
    .time-val { font-family: monospace; font-size: 18px; color: var(--primary-blue); font-weight: bold; }

    /* Modal */
    .modal {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
      z-index: 1000; align-items: center; justify-content: center;
    }
    .modal-content { background: #1e293b; padding: 35px; border-radius: 20px; text-align: center; width: 320px; }
    .modal-input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: none; font-size: 20px; text-align: center; }
  </style>
</head>
<body>

  <nav>
    <div class="brand-section">
      <img src="{{ url_for('static', filename='mstec.png') }}" alt="Logo MS" style="height: 40px; width: auto; object-fit: contain;">
      <h1 class="brand-h1"><span style="color: var(--primary-blue);">MONITOR</span></h1>
    </div>
 
    <div class="clock-section" id="relogio">00:00:00</div>

    <button class="config-btn" onclick="toggleModal(true)">⚙️ CONFIGURAÇÕES</button>
  </nav>

  <main>
    <div class="panel-cam">
      <div class="roi-section">
        <div class="roi-title">Status ROIs</div>
        <div id="rois1"></div>
      </div>
      
      <div class="view-section">
        <div class="prog-badge" id="nome_programa1">---</div>
        <img id="imagemStatus1" class="camera-img" src="" alt="CAM 1">
        <img src="{{ url_for('static', filename='ms.png') }}" class="logo-ms" alt="Logo MS">
      </div>
      
      <div class="info-section">
        <div>
          <div class="cam-label">CAMERA 01</div>
          <div id="programa1" style="font-size: 14px; color: var(--text-dim); font-weight: bold;">ID: --</div>
        </div>
        <div class="status-text" id="statusGeral1">---</div>
        <div class="perf-box">
          <div style="font-size: 10px; color: var(--text-dim); margin-bottom: 5px;">CYCLE TIME</div>
          <div class="time-val" id="tempoExecucao1">0.00 ms</div>
        </div>
      </div>
    </div>

    <div class="panel-cam">
      <div class="roi-section">
        <div class="roi-title">Status ROIs</div>
        <div id="rois2"></div>
      </div>
      
      <div class="view-section">
        <div class="prog-badge" id="nome_programa2">---</div>
        <img id="imagemStatus2" class="camera-img" src="" alt="CAM 2">
        <img src="{{ url_for('static', filename='ms.png') }}" class="logo-ms" alt="Logo MS">
      </div>
      
      <div class="info-section">
        <div>
          <div class="cam-label">CAMERA 02</div>
          <div id="programa2" style="font-size: 14px; color: var(--text-dim); font-weight: bold;">ID: --</div>
        </div>
        <div class="status-text" id="statusGeral2">---</div>
        <div class="perf-box">
          <div style="font-size: 10px; color: var(--text-dim); margin-bottom: 5px;">CYCLE TIME</div>
          <div class="time-val" id="tempoExecucao2">0.00 ms</div>
        </div>
      </div>
    </div>
  </main>

  <div id="modalSenha" class="modal">
    <div class="modal-content">
      <h3 style="color: white; margin-bottom: 10px;">ACESSO RESTRITO</h3>
      <input type="password" id="senhaInput" class="modal-input" placeholder="••••">
      <div style="display: flex; gap: 10px;">
        <button onclick="toggleModal(false)" style="flex: 1; background: none; color: var(--text-dim); border: none; cursor: pointer;">Sair</button>
        <button onclick="verificarSenha()" style="flex: 2; background: var(--primary-blue); color: white; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer;">ENTRAR</button>
      </div>
    </div>
  </div>

  <script>
    // Função do Relógio
    function atualizarRelogio() {
      const agora = new Date();
      const h = String(agora.getHours()).padStart(2, '0');
      const m = String(agora.getMinutes()).padStart(2, '0');
      const s = String(agora.getSeconds()).padStart(2, '0');
      document.getElementById('relogio').textContent = `${h}:${m}:${s}`;
    }
    setInterval(atualizarRelogio, 1000);
    atualizarRelogio();

    function toggleModal(show) { document.getElementById("modalSenha").style.display = show ? "flex" : "none"; }
    
    function verificarSenha() {
      if(document.getElementById("senhaInput").value === "sistema") window.location.href = "/configuracoes";
      else alert("Senha incorreta");
    }

    async function atualizarStatus(camera) {
      try {
        const res = await fetch(`/status.json?camera=${camera}`);
        const data = await res.json();

        // ROIs
        const roisDiv = document.getElementById(`rois${camera}`);
        roisDiv.innerHTML = '';
        for (let i = 1; i <= data.n_rois; i++) {
          const status = data[`parcial_p${i}`];
          const div = document.createElement('div');
          div.className = `roi-card ${status ? 'roi-ok' : 'roi-nok'}`;
          div.innerHTML = `<span>ROI ${i}</span> <span>${status ? 'OK' : 'FAIL'}</span>`;
          roisDiv.appendChild(div);
        }

        document.getElementById(`programa${camera}`).textContent = `PROGRAMA: ${data.programa}`;
        document.getElementById(`nome_programa${camera}`).textContent = data.nome_programa;
        document.getElementById(`imagemStatus${camera}`).src = `/imagem_status.jpg?camera=${camera}&t=${new Date().getTime()}`;
        
        const stGeral = document.getElementById(`statusGeral${camera}`);
        if(data.status_geral) {
            stGeral.textContent = 'APROVADO';
            stGeral.className = 'status-text text-ok';
        } else {
            stGeral.textContent = 'REJEITADO';
            stGeral.className = 'status-text text-nok';
        }
        document.getElementById(`tempoExecucao${camera}`).textContent = `${data.tempo_execucao.toFixed(2)} ms`;
      } catch (e) { console.error(e); }
    }

    setInterval(() => { atualizarStatus(1); atualizarStatus(2); }, 1000);
    atualizarStatus(1); atualizarStatus(2);
  </script>
</body>
</html>
