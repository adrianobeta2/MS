<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Colaborador</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            padding: 20px;
        }

        .container {
            width: 420px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #bbb;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #0066ff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            margin-top: 12px;
            cursor: pointer;
        }

        button:hover {
            background: #004acc;
        }

        h2 {
            text-align: center;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Cadastro de Colaborador</h2>

    <form action="/cadastrar_foto_new" method="POST" enctype="multipart/form-data">

        <label>Nome Completo:</label>
        <input type="text" name="nome" required>

        <label>Matrícula:</label>
        <input type="text" name="matricula" required>

        <label>Setor:</label>
        <input type="text" name="setor" required>

        <label>Função:</label>
        <input type="text" name="funcao" required>

        <label>Foto do colaborador:</label>
        <input type="file" name="imagem" accept="image/*" required>

        <button type="submit">Cadastrar</button>
    </form>
</div>

</body>
</html>
